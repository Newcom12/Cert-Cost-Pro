name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Validate poetry config
        run: poetry check

      - name: Smoke check syntax
        run: poetry run python -m compileall main.py src

      - name: Run tests if present
        shell: bash
        run: |
          if [ -d tests ] || ls -1 test_*.py >/dev/null 2>&1; then
            poetry run pytest -q
          else
            echo "No tests found - skipping pytest"
          fi

      - name: Build Docker image
        run: docker build -t certcost-pro-bot:ci .
